<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfer News - FootballAl24</title>

<!-- Bootstrap for basic styling -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Swiper CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

<style>
    /* Card style for each slide */
    .transfer-card {
        background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        border-radius: 12px;
        padding: 15px 20px;
        border-left: 5px solid #007bff;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        text-align: left;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        transition: transform 0.3s, box-shadow 0.3s, border-left-color 0.3s;
    }

    .transfer-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        border-left-color: #28a745; /* Change color on hover */
    }

    .transfer-card strong {
        font-size: 1rem;
        line-height: 1.3rem;
        display: -webkit-box;
        -webkit-line-clamp: 3; /* limit to 3 lines */
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 8px;
        color: #212529;
    }

    .transfer-card small {
        color: #6c757d;
        margin-bottom: 10px;
    }

    .transfer-card a {
        margin-top: auto;
        text-decoration: none;
        color: #007bff;
        font-weight: 500;
    }

    .transfer-card a:hover {
        text-decoration: underline;
    }

    /* Optional: add a small icon before source */
    .transfer-card small::before {
        content: "📰 ";
    }

    /* Swiper padding */
    .swiper {
        padding: 20px 0;
    }
</style>
</head>
<body class="bg-light">

<div class="container my-4">
    <h2 class="mb-3">Latest Transfer News</h2>

    {% if transfer_news %}
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            {% for t in transfer_news %}
            <div class="swiper-slide">
                <div class="transfer-card">
                    <strong>{{ t.title }}</strong>
                    <small>{{ t.source|title }}</small>
                    <a href="{{ t.url }}" target="_blank">Read full article →</a>
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- Navigation arrows -->
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>

        <!-- Pagination dots -->
        <div class="swiper-pagination"></div>
    </div>
    {% else %}
    <p>No transfer news available.</p>
    {% endif %}
</div>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
<script>
const swiper = new Swiper(".mySwiper", {
    slidesPerView: 3,
    spaceBetween: 20,
    loop: true,
    autoplay: {
        delay: 5000,
        disableOnInteraction: false,
    },
    navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
    },
    pagination: {
        el: ".swiper-pagination",
        clickable: true,
    },
    breakpoints: {
        0: { slidesPerView: 1, spaceBetween: 10 },
        768: { slidesPerView: 2, spaceBetween: 15 },
        1024: { slidesPerView: 3, spaceBetween: 20 },
        1400: { slidesPerView: 4, spaceBetween: 25 },
    },
});
</script>

</body>
</html>
